name: Must-b
options:
  bundleIdPrefix: ai.must-b
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  Must-bKit:
    path: ../shared/Must-bKit
  Swabble:
    path: ../../Swabble

schemes:
  Must-b:
    shared: true
    build:
      targets:
        Must-b: all
    test:
      targets:
        - Must-bTests
        - Must-bLogicTests
  Must-bLogicTests:
    shared: true
    build:
      targets:
        Must-bLogicTests: all
    test:
      targets:
        - Must-bLogicTests

targets:
  Must-b:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: Must-bShareExtension
        embed: true
      - target: Must-bActivityWidget
        embed: true
      - target: Must-bWatchApp
      - package: Must-bKit
      - package: Must-bKit
        product: Must-bChatUI
      - package: Must-bKit
        product: Must-bProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Must-b.entitlements
        CODE_SIGN_STYLE: "$(MUSTB_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MUSTB_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MUSTB_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MUSTB_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          MUSTB_PUSH_TRANSPORT: direct
          MUSTB_PUSH_DISTRIBUTION: local
          MUSTB_PUSH_RELAY_BASE_URL: ""
          MUSTB_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          MUSTB_PUSH_TRANSPORT: direct
          MUSTB_PUSH_DISTRIBUTION: local
          MUSTB_PUSH_RELAY_BASE_URL: ""
          MUSTB_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Must-b
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.must-b.ios
            CFBundleURLSchemes:
              - must-b
        CFBundleShortVersionString: "$(MUSTB_MARKETING_VERSION)"
        CFBundleVersion: "$(MUSTB_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.must-b.ios.bgrefresh
        NSLocalNetworkUsageDescription: Must-b discovers and connects to your Must-b gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _must-b-gw._tcp
        NSCameraUsageDescription: Must-b can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Must-b uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Must-b can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Must-b needs microphone access for voice wake.
        NSMotionUsageDescription: Must-b may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Must-b needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Must-b uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        Must-bPushTransport: "$(MUSTB_PUSH_TRANSPORT)"
        Must-bPushDistribution: "$(MUSTB_PUSH_DISTRIBUTION)"
        Must-bPushRelayBaseURL: "$(MUSTB_PUSH_RELAY_BASE_URL)"
        Must-bPushAPNsEnvironment: "$(MUSTB_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  Must-bShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: Must-bKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MUSTB_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MUSTB_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(MUSTB_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(MUSTB_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Must-b Share
        CFBundleShortVersionString: "$(MUSTB_MARKETING_VERSION)"
        CFBundleVersion: "$(MUSTB_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  Must-bActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/Must-bActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MUSTB_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MUSTB_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(MUSTB_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Must-b Activity
        CFBundleShortVersionString: "$(MUSTB_MARKETING_VERSION)"
        CFBundleVersion: "$(MUSTB_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  Must-bWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: Must-bWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(MUSTB_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Must-b
        CFBundleShortVersionString: "$(MUSTB_MARKETING_VERSION)"
        CFBundleVersion: "$(MUSTB_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(MUSTB_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  Must-bWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(MUSTB_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Must-b
        CFBundleShortVersionString: "$(MUSTB_MARKETING_VERSION)"
        CFBundleVersion: "$(MUSTB_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(MUSTB_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  Must-bTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Must-b
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MUSTB_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MUSTB_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.must-b.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Must-b.app/Must-b"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: Must-bTests
        CFBundleShortVersionString: "$(MUSTB_MARKETING_VERSION)"
        CFBundleVersion: "$(MUSTB_BUILD_VERSION)"

  Must-bLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: Must-bKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(MUSTB_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(MUSTB_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.must-b.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: Must-bLogicTests
        CFBundleShortVersionString: "$(MUSTB_MARKETING_VERSION)"
        CFBundleVersion: "$(MUSTB_BUILD_VERSION)"
