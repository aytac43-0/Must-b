<!DOCTYPE html>
<html>
<head>
  <title>Must-b Dashboard</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: sans-serif; background: #0b1020; color: #e6eafc; }
    .card { background:#141a2b; padding:16px; margin:12px; border-radius:8px; }
    #logs { height: 300px; overflow:auto; background:#0b1220; padding:8px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="card"><h2>Must-b Gateway</h2><div id="status">Connecting...</div></div>
  <div class="card"><h3>Current Task</h3><div id="current"></div></div>
  <div class="card"><h3>Task History</h3><div id="history"></div></div>
  <div class="card"><h3>Telegram Status</h3><div id="telegram">Unknown</div></div>
  <div class="card"><h3>Logs</h3><div id="logs"></div></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const statusEl = document.getElementById('status');
    const currentEl = document.getElementById('current');
    const historyEl = document.getElementById('history');
    const telegramEl = document.getElementById('telegram');
    const logsEl = document.getElementById('logs');

    // Basic alive indicator
    statusEl.textContent = 'Gateway active. Awaiting tasks...';
    telegramEl.textContent = 'Telegram: Unknown';

    socket.on('agentUpdate', (payload) => {
      const t = payload.type || 'update';
      console.log('update', payload);
      switch(t) {
        case 'planStart':
          currentEl.textContent = 'Planning: ' + (payload.goal || 'unknown');
          break;
        case 'stepStart':
          currentEl.textContent = 'Running: ' + (payload.step?.id ?? 'step');
          break;
        case 'stepFinish':
          currentEl.textContent = 'Finished: ' + (payload.step?.id ?? 'step');
          break;
        case 'planFinish':
          currentEl.textContent = 'Plan: ' + (payload.status ?? 'unknown');
          break;
        case 'planGenerated':
          // show simple summary
          break;
        case 'log':
          // append to logs
          const div = document.createElement('div');
          div.textContent = `[${new Date(payload.timestamp || Date.now()).toLocaleTimeString()}] ${payload.message || ''}`;
          logsEl.appendChild(div);
          logsEl.scrollTop = logsEl.scrollHeight;
          break;
      }
    });

    // Attempt to fetch initial status
    fetch('/api/status').then(r => r.json()).then(d => {
      statusEl.textContent = 'Gateway live at http://localhost:3000';
    });

  </script>
</body>
</html>
