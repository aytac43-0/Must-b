services:
  - type: web
    name: must-b
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: MUSTB_STATE_DIR
        value: /data/.must-b
      - key: MUSTB_WORKSPACE_DIR
        value: /data/workspace
      - key: MUSTB_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: must-b-data
      mountPath: /data
      sizeGB: 1
