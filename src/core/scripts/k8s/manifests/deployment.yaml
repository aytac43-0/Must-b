apiVersion: apps/v1
kind: Deployment
metadata:
  name: must-b
  labels:
    app: must-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: must-b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: must-b
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /config/must-b.json /home/node/.must-b/must-b.json
              mkdir -p /home/node/.must-b/workspace
              cp /config/AGENTS.md /home/node/.must-b/workspace/AGENTS.md
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: must-b-home
              mountPath: /home/node/.must-b
            - name: config
              mountPath: /config
      containers:
        - name: gateway
          image: ghcr.io/must-b/must-b:slim
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: MUSTB_CONFIG_DIR
              value: /home/node/.must-b
            - name: NODE_ENV
              value: production
            - name: MUSTB_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: must-b-secrets
                  key: MUSTB_GATEWAY_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: must-b-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: must-b-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: must-b-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: must-b-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: must-b-home
              mountPath: /home/node/.must-b
            - name: tmp-volume
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: must-b-home
          persistentVolumeClaim:
            claimName: must-b-home-pvc
        - name: config
          configMap:
            name: must-b-config
        - name: tmp-volume
          emptyDir: {}
